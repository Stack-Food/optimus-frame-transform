# ATENÇÃO: NÃO COMMITE ESTE ARQUIVO COM VALORES REAIS.
# Para produção, utilize AWS Secrets Manager com External Secrets Operator,
# ou crie o Secret manualmente via kubectl:
#
#   kubectl create secret generic optimus-transform-secret \
#     --namespace optimus-frame \
#     --from-literal=RabbitMQ__UserName='<valor>' \
#     --from-literal=RabbitMQ__Password='<valor>' \
#     --from-literal=AccessKey='<valor>' \
#     --from-literal=SecretKey='<valor>' \
#     --from-literal=SessionToken='<valor>'
#
# RECOMENDAÇÃO para EKS: prefira IRSA (IAM Roles for Service Accounts)
# em vez de credenciais estáticas. Consulte o README para mais detalhes.
apiVersion: v1
kind: Secret
metadata:
  name: optimus-transform-secret
  namespace: production
  labels:
    app.kubernetes.io/name: optimus-transform-worker
    app.kubernetes.io/part-of: production
type: Opaque
stringData:
  RabbitMQ__UserName: "admin"
  RabbitMQ__Password: "Optimus-Frame@2026"
  # Credenciais AWS — substitua por IRSA em produção
  AccessKey: "AWS_ACCESS_KEY_ID"
  SecretKey: "AWS_SECRET_ACCESS_KEY"
  SessionToken: "AWS_SESSION_TOKEN"
