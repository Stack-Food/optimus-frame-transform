apiVersion: apps/v1
kind: Deployment
metadata:
  name: optimus-transform-worker
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: worker
          resources:
            requests:
              cpu: "500m"
              memory: "768Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          env:
            - name: DOTNET_ENVIRONMENT
              value: "Production"
