apiVersion: apps/v1
kind: Deployment
metadata:
  name: optimus-transform-worker
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: worker
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: DOTNET_ENVIRONMENT
              value: "Development"
