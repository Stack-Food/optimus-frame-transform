name: OptimusFrame Transform CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - develop
          - production

env:
  DOTNET_VERSION: '8.0.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: optimus-frame-transform

jobs:

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore OptimusFrame.Transform.sln

      - name: Build solution
        run: dotnet build OptimusFrame.Transform.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test OptimusFrame.Transform.sln --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults/ -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: '**/coverage.cobertura.xml'

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set Docker metadata
        id: meta
        run: |
          COMMIT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "image_prefix=prod" >> $GITHUB_OUTPUT
            echo "primary_tag=$COMMIT_SHA" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "image_prefix=dev" >> $GITHUB_OUTPUT
            echo "primary_tag=$COMMIT_SHA" >> $GITHUB_OUTPUT
          else
            echo "image_prefix=dev" >> $GITHUB_OUTPUT
            echo "primary_tag=$COMMIT_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: OptimusFrame.Transform.Worker/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.image_prefix }}-${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.primary_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-push:
    name: Docker Image Push to GHCR
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: read
      packages: write
      id-token: write
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    outputs:
      image-digest: ${{ steps.build-and-push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.0.0
        with:
          cosign-release: "v3.0.2"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare repository owner
        id: repo_owner
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set Docker tags
        id: meta
        run: |
          COMMIT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          OWNER="${{ steps.repo_owner.outputs.owner_lc }}"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "image_name=prod-${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT
            echo "tags=${{ env.REGISTRY }}/$OWNER/prod-${{ env.IMAGE_NAME }}:$COMMIT_SHA" >> $GITHUB_OUTPUT
          else
            echo "image_name=dev-${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT
            echo "tags=${{ env.REGISTRY }}/$OWNER/dev-${{ env.IMAGE_NAME }}:$COMMIT_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: OptimusFrame.Transform.Worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          IFS=',' read -ra TAG_ARRAY <<< "$TAGS"
          for tag in "${TAG_ARRAY[@]}"; do
            echo "Signing $tag@$DIGEST"
            cosign sign --yes "$tag@$DIGEST"
          done


  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare repository owner
        id: repo_owner
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up kubectl for EKS
        run: |
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Set deployment parameters
        id: deploy_params
        run: |
          if [[ "${{ inputs.environment }}" == "production" ]]; then
            echo "image_name=prod-${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT
            echo "namespace=production" >> $GITHUB_OUTPUT
          else
            echo "image_name=dev-${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT
            echo "namespace=develop" >> $GITHUB_OUTPUT
          fi
          # Get latest commit hash for the branch
          LATEST_COMMIT=$(git rev-parse --short=7 HEAD)
          echo "image_tag=$LATEST_COMMIT" >> $GITHUB_OUTPUT

      - name: Deploy to Kubernetes
        env:
          IMAGE_NAME_FULL: ${{ steps.deploy_params.outputs.image_name }}
          IMAGE_TAG: ${{ steps.deploy_params.outputs.image_tag }}
          NAMESPACE: ${{ steps.deploy_params.outputs.namespace }}
          REPO_OWNER: ${{ steps.repo_owner.outputs.owner_lc }}
        run: |
          # Update the deployment image
          kubectl set image deployment/optimus-frame-transform \
            optimus-frame-transform=${{ env.REGISTRY }}/$REPO_OWNER/$IMAGE_NAME_FULL:$IMAGE_TAG \
            -n $NAMESPACE

          # Wait for rollout to complete
          kubectl rollout status deployment/optimus-frame-transform -n $NAMESPACE --timeout=5m

          # Apply manifests to ensure configuration is up to date
          kubectl apply -f k8s/deployment.yaml -n $NAMESPACE
          kubectl apply -f k8s/service.yaml -n $NAMESPACE

          echo "✅ Deployment successful to $NAMESPACE environment"
          echo "📦 Image: ${{ env.REGISTRY }}/$REPO_OWNER/$IMAGE_NAME_FULL:$IMAGE_TAG"
